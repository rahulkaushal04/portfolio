<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Prevent indexing of error page -->
  <meta name="robots" content="noindex, follow">

  <title>404 — Page Not Found | Rahul Kaushal</title>
  <meta name="description" content="Oops! The page you're looking for doesn't exist.">

  <!-- Use root-relative paths to prevent broken assets on nested routes -->
  <link rel="icon" href="/assets/images/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/assets/css/main.css">

  <style>
    /* Full-page centered error layout */
    .error-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--sp-6);
      gap: var(--sp-6);
    }

    /* Floating decorative illustration */
    .error-page__illustration {
      font-size: 8rem;
      line-height: 1;
      user-select: none;
      animation: float 3s ease-in-out infinite;
    }

    /* Gradient-styled error code */
    .error-page__code {
      font-family: var(--ff-heading);
      font-size: var(--fs-5xl);
      font-weight: var(--fw-extrabold);
      background: linear-gradient(135deg, var(--clr-accent), var(--clr-success));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .error-page__title {
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
      color: var(--clr-text-primary);
      margin: 0;
    }

    .error-page__message {
      font-size: var(--fs-md);
      color: var(--clr-text-secondary);
      max-width: 480px;
    }

    .error-page__home-btn {
      margin-top: var(--sp-4);
    }

    /* Subtle floating animation */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
  </style>
</head>

<body>
  <main class="error-page">

    <!-- Decorative emoji (safe UTF-8 character) -->
    <div class="error-page__illustration" aria-hidden="true">🛰️</div>

    <span class="error-page__code">404</span>

    <h1 class="error-page__title">Looks like you're lost</h1>

    <p class="error-page__message">
      The page you're looking for has wandered off the grid.
      Maybe it was never here, or maybe it's hiding. Either way, let's get you back.
    </p>

    <!-- Root-relative link ensures correct navigation -->
    <a href="/" class="btn btn-primary error-page__home-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Take Me Home
    </a>

  </main>
</body>
</html>
